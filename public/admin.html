<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="icon" href="SOS-LOGEMENT (1).png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        margin: 0;
        font-family: 'Times New Roman', Times, serif;
      }
      .hidden {
        display: none;
      }


      /* Layout */
      .layout {
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: #111827;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;

        position: fixed;   /* 👈 يخليه ثابت */
        top: 0;
        left: 0;
        height: 100vh;

        overflow-y: auto;  /* 👈 يخلي الأزرار فقط scroll */
      }

      .sidebar h2 {
        margin-bottom: 20px;
      }

      .sidebar button {
        background: none;
        border: none;
        color: white;
        padding: 10px;
        text-align: left;
        cursor: pointer;
        border-radius: 8px;
        margin-bottom: 5px;
      }

      .sidebar button:hover {
        background: #1f2937;
      }

      .logout {
        background: red !important;
      }

      /* Content */
      .content {
        flex: 1;
        background: #f5f5f5;
        padding: 20px;
        overflow-y: auto;
        position: relative;
        margin-left: 240px; /* 👈 هذا هو الحل */

      }

      /* Cards */
      .card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
      }

      /* Buttons */
      .approve {
        background: green;
        color: white;
      }

      .delete {
        background: red;
        color: white;
      }

      
      .search {
      position: absolute;
      top: 20px;
      right: 20px;

      width: 45px;
      height: 45px;

      border-radius: 50%;
      border: 1px solid #ccc;
      padding: 10px;

      transition: 0.3s;
      overflow: hidden;
      }

    /* عند التركيز */
    .search:focus {
      width: 300px;
      border-radius: 8px;
    }

      /* زر دائري */
      .menu-toggle {
        display: none;
      }

      .overlay {
        display: none;
      }

      /* 📱 موبايل فقط */
      @media (max-width: 768px) {

        .menu-toggle {
          display: flex;
          position: fixed;
          top: 20px;
          left: 20px;
          width: 55px;
          margin-bottom: 40px;
          height: 55px;
          border-radius: 50%;
          background: #111827;
          color: white;
          font-size: 22px;
          border: none;
          z-index: 2000;
          align-items: center;
          justify-content: center;
          transition: 0.3s;
        }

        .menu-toggle.hide {
          display: none;
        }

        /* Sidebar يصبح مخفي */
        .sidebar {
          left: -250px;
          transition: 0.3s;
          z-index: 1500;
        }

        .sidebar.show {
          left: 0;
        }

        /* Overlay */
        .overlay {
          position: fixed;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.4);
          z-index: 1400;
        }

        .overlay.show {
          display: block;
        }

        /* إزالة margin لأن sidebar مخفي */
        .content {
          margin-left: 0;
          padding-top: 80px;


        }
      }

    </style>
  </head>
  <body>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>
  <div class="overlay" onclick="toggleMenu()"></div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Admin</h2>

      <button onclick="showStats()">📊 Statistiques</button>
      <button onclick="showApproved()">🏠 Approuvés</button>
      <button onclick="showPending()">📦 En attente</button>
      <button onclick="showHidden()">🙈 Masqués</button>
      <button onclick="showOwners()">👤 Propriétaires</button>
      <button onclick="showOwnersFull()">📋 Infos complètes</button>
      <button onclick="showStudents()">🎓 Étudiants</button>
      <button onclick="showSeekers()">🔎 Chercheurs</button>
      <hr> 
      <hr>
      <button onclick="showDiaspora()">🌍 Diaspora</button>

      <hr>

      <button onclick="sendMail('student')">📧 Étudiants</button>
      <button onclick="sendMail('seeker')">📧 Chercheurs</button>
      <button onclick="sendMail('owner')">📧 Propriétaires</button>
      <button onclick="sendMail('all')">📧 Tous</button>

      <hr>

      <button onclick="logout()" class="logout">🚪 Logout</button>
    </div>

   <div class="content">
 
    <input 
      class="search"
      type="text" 
      id="searchInput" 
      placeholder="🔍 Rechercher..."
      onkeyup="searchUsers()"
    >
    

    <div id="searchResults"></div>


    <!-- Main Content -->
    <h1>Admin Dashboard</h1>

  <div id="stats" class="card section hidden"></div><br>

  <canvas id="statsChart" width="400" height="200"></canvas>

  <div id="approvedSection" class="section hidden">
    <h2>🏠 Biens approuvés</h2>
    <div id="approvedProperties"></div>
  </div>

  <div id="pendingSection" class="section hidden">
    <h2>📦 Biens en attente</h2>
    <div id="properties"></div>
  </div>

  <div id="hiddenSection" class="section hidden">
    <h2>🙈 Biens masqués</h2>
    <div id="hiddenProperties"></div>
  </div>

  <div id="ownersSection" class="section hidden">
    <h2>👤 Demandes propriétaires</h2>
    <div id="owners"></div>
  </div>

  <div id="ownersFullSection" class="section hidden">
    <h2>📋 Informations complètes des propriétaires</h2>
    <div id="ownersFull"></div>
  </div>

  <div id="studentsSection" class="section hidden">
  <h2>🎓 Étudiants</h2>
  <div id="students"></div>
  </div>

  <div id="seekersSection" class="section hidden">
    <h2>🔎 Chercheurs</h2>
    <div id="seekers"></div>
  </div>

  <div id="diasporaSection" class="section hidden">
    <h2>🌍 Messages Diaspora</h2>
    <div id="diasporaMessages"></div>
  </div>

  <div id="editModal" class="hidden card">
    <h3>Edit Property</h3>

    <input id="editPrice" placeholder="Price"><br><br>
    <input id="editCity" placeholder="City"><br><br>

    <input type="file" id="editImages" multiple><br><br>

    <button onclick="saveEdit()">💾 Save</button>
    <button onclick="closeEdit()">❌ Cancel</button>
  </div>

</div>
</div>  
  
  <script>
    const token = localStorage.getItem("token");

    function loadProperties() {
      fetch("https://sos-logement.onrender.com/admin/properties", {
      headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
    const container = document.getElementById("properties");
    container.innerHTML = "";

    data.forEach(p => {
      container.innerHTML += `
      <div class="card">
      ${p.images ? p.images.map(img => `
        <div>
          <img src="${img.url}" width="100">

          <button onclick="setCover('${img.url}', ${p.id})">
            ⭐ Set Cover
          </button>

          <button onclick="deleteImage(${img.id})">🗑️ Delete</button>
        </div>
      `).join("") : ""}
      <p><b>${p.city}</b> - ${p.price} FCFA</p>

      <hr>

      <p>👤 Nom: ${p.first_name + " " + p.last_name}</p>
      <p>📞 Téléphone: ${p.phone || "N/A"}</p>
      <p>🆔 Référence owner: ${p.owner_ref || "N/A"}</p>

      <button class="approve" onclick="approveProperty(${p.id})">Approve</button>
      <button onclick="hideProperty(${p.id})">Hide</button>
      <button class="delete" onclick="deleteProperty(${p.id})">Delete</button>

      </div>
      `;
    });
    });
    }

    function loadHiddenProperties(){
      fetch("https://sos-logement.onrender.com/admin/properties-hidden",{
      headers:{ "Authorization": "Bearer " + token }
      })
      .then(res=>res.json())
      .then(data=>{

      const container = document.getElementById("hiddenProperties");
      container.innerHTML = "";

      data.forEach(p=>{

      container.innerHTML += `
      <div class="card">
      <h3>${p.title}</h3>
      <p>${p.city} - ${p.price} FCFA</p>

      <button onclick="restoreProperty(${p.id})">Restore</button>
      <button class="delete" onclick="deleteProperty(${p.id})">Delete</button>

      </div>
      `;

      });

    });
    }


    function setCover(imageUrl, propertyId){
      fetch(`https://sos-logement.onrender.com/properties/${propertyId}/cover`,{
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer " + token
        },
        body: JSON.stringify({
          image_url: imageUrl
        })
      })
      .then(()=> alert("Cover updated ✅"));
    }


    function hideProperty(id){
      fetch(`https://sos-logement.onrender.com/admin/properties/${id}/hide`,{
      method:"PUT",
      headers:{ "Authorization": "Bearer " + token }
      }).then(()=>loadProperties());
    }

    function deleteProperty(id){
      fetch(`https://sos-logement.onrender.com/admin/properties/${id}`,{
      method:"DELETE",
      headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
      loadProperties();
      loadApprovedProperties();
      loadHiddenProperties();
      });
    }
            
    function loadOwners() {
      fetch("https://sos-logement.onrender.com/admin/all-owner-requests", {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById("owners");
        container.innerHTML = "";
        
        data.forEach(u => {


          container.innerHTML += `
            <div class="card">

              <p><b>Nom:</b> ${u.first_name} ${u.last_name}</p>
              <p><b>Email:</b> ${u.email}</p>
              <p><b>Téléphone:</b> ${u.phone || "N/A"}</p>
              <p><b>Conditions:</b> ${u.conditions}</p>
              <p><b>Commission:</b> ${u.commission}</p>
              <p><b>Source:</b> ${u.source}</p>

             ${
                u.source === "registered"
                  ? `<button class="approve" onclick="approveOwner(${u.id})">Approve registered</button>`
                  : `<button class="approve" onclick="approvePublicOwner(${u.id})">Approve public</button>
                    <button class="delete" onclick="deletePublicRequest(${u.id})">Delete</button>`
              }

            </div>
          `;
        });

      });
    }

    function loadOwnersFull(){
      fetch("https://sos-logement.onrender.com/admin/owners-full",{
        headers:{
          "Authorization":"Bearer " + token
        }
      })
      .then(res=>res.json())
      .then(data=>{

        const container = document.getElementById("ownersFull");
        container.innerHTML = "";

        data.forEach(o=>{
          container.innerHTML += `
            <div class="card">
              <p><b>Nom:</b> ${o.first_name} ${o.last_name}</p>
              <p><b>Email:</b> ${o.email}</p>
              <p><b>Référence:</b> ${o.owner_ref || "N/A"}</p>
              <p><b>Téléphone:</b> ${o.phone || "N/A"}</p>
              <p><b>Conditions:</b> ${o.conditions || "N/A"}</p>
              <p><b>Commission:</b> ${o.commission || "N/A"}</p>

              <hr>

              <button onclick="sendSingleMail('${o.email}')">📧 Envoyer</button>
              <button class="delete" onclick="deleteUser(${o.id})">🗑️ Supprimer</button>
                ${o.banned 
                ? `<button onclick="unbanUser(${o.id})">✅ Débloquer</button>`
                : `<button onclick="banUser(${o.id})">🚫 Bloquer</button>`
              }
            </div>
          `;
        });

      });
    }


    function toggleMenu() {
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.querySelector(".overlay");

      sidebar.classList.toggle("show");
      overlay.classList.toggle("show");
    }

    let lastScrollTop = 0;
    const btn = document.querySelector('.menu-toggle');

    window.addEventListener("scroll", () => {
      let currentScroll = window.pageYOffset || document.documentElement.scrollTop;

      if (currentScroll > lastScrollTop) {
        btn.classList.add("hide"); // ينزل → يختفي
      } else {
        btn.classList.remove("hide"); // يطلع → يظهر
      }

      lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
    });

    function restoreProperty(id){
      fetch(`https://sos-logement.onrender.com/admin/properties/${id}/restore`,{
      method:"PUT",
      headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
      loadHiddenProperties();
      loadApprovedProperties();
      });
    }

    function loadApprovedProperties() {
      fetch("https://sos-logement.onrender.com/admin/properties-approved",{
      headers:{ "Authorization": "Bearer " + token }
      })
      .then(res=>res.json())
      .then(data=>{

      const container = document.getElementById("approvedProperties");
      container.innerHTML = "";

      data.forEach(p=>{

      container.innerHTML += `
        <div class="card">
          <h3>${p.title}</h3>
          <p><b>${p.city}</b> - ${p.price} FCFA</p>

          <hr>

          <p>👤 Nom: ${p.first_name + " " + p.last_name}</p>
          <p>📞 Téléphone: ${p.phone || "N/A"}</p>
          <p>🆔 Référence owner: ${p.owner_ref || "N/A"}</p>

          <button onclick="editProperty(${p.id})">✏️ Edit</button>
          <button onclick="hideProperty(${p.id})">Hide</button>
          <button class="delete" onclick="deleteProperty(${p.id})">Delete</button>
        </div>
      `;

      });

      });
    }

    function approveProperty(id){
      fetch(`https://sos-logement.onrender.com/admin/properties/${id}/approve`,{
      method:"PUT",
      headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
      loadProperties();
      loadApprovedProperties();
      });
    }

    function approveOwner(id){
    fetch(`https://sos-logement.onrender.com/admin/users/${id}/approve-owner`,{
    method:"PUT",
    headers:{ "Authorization": "Bearer " + token }
    }).then(()=>loadOwners());
    }

    function deleteUser(id){
      fetch(`https://sos-logement.onrender.com/admin/users/${id}`,{
        method:"DELETE",
        headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
        loadOwnersFull(); // ✅ بدل loadOwners
      });
    }

    function banUser(id){
      fetch(`https://sos-logement.onrender.com/admin/users/${id}/ban`,{
        method:"PUT",
        headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
        loadOwnersFull(); // ✅
      });
    }

    function unbanUser(id){
      fetch(`https://sos-logement.onrender.com/admin/users/${id}/unban`,{
        method:"PUT",
        headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
        loadOwnersFull(); // ✅
      });
    }

    function loadDiasporaMessages() {
      fetch("https://sos-logement.onrender.com/admin/diaspora", {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById("diasporaMessages");
        container.innerHTML = "";

        data.forEach(msg => {
          container.innerHTML += `
            <div class="card">
              <p><b>Nom:</b> ${msg.name}</p>
              <p><b>Email:</b> ${msg.email}</p>
              <p><b>Téléphone:</b> ${msg.phone || "N/A"}</p>
              <p><b>Pays:</b> ${msg.country || "N/A"}</p>

              <hr>

              <p><b>Message:</b></p>
              <p>${msg.message}</p>

              <hr>

              <button onclick="replyDiaspora('${msg.email}')">📧 Répondre</button>
              <button class="delete" onclick="deleteDiaspora(${msg.id})">🗑️ Supprimer</button>
            </div>
          `;
        });

      });
    }

    function replyDiaspora(email){
      const message = prompt("Écrire votre réponse pour " + email);

      if(!message) return;

      fetch("https://sos-logement.onrender.com/admin/reply-diaspora", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          email: email,
          message: message
        })
      });

      alert("Réponse envoyée ✅");
    }

    function deleteDiaspora(id){
      if(!confirm("Supprimer ce message ?")) return;

      fetch(`https://sos-logement.onrender.com/admin/diaspora/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      })
      .then(() => loadDiasporaMessages());
    }

    
    function sendMail(role){

    const message = prompt("Écrire le message");

    fetch("https://sos-logement.onrender.com/admin/send-mail",{
    method:"POST",
    headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+token
    },
    body: JSON.stringify({
    role:role,
    message:message
    })
    });

    alert("Emails envoyés");

    }

    function logout(){
      fetch("https://sos-logement.onrender.com/logout",{
        method:"POST",
        headers:{ "Authorization": "Bearer " + token }
      }).then(()=>{
        localStorage.removeItem("token");
        window.location.href="login.html";
      });
    }

    let currentStudentPage = 1;

    function loadStudents(page = 1){
      currentStudentPage = page;

      fetch(`https://sos-logement.onrender.com/admin/students?page=${page}`, {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById("students");
        container.innerHTML = "";

        data.forEach(u => {
          container.innerHTML += `
            <div class="card">
              <p>${u.email}</p>
              <button onclick="banUser(${u.id})">Ban</button>
              <button class="delete" onclick="deleteUser(${u.id})">Delete</button>
              <button onclick="sendSingleMail('${u.email}')">📧 Send</button>
            </div>
          `;
        });

        // 👇 أزرار التنقل
        container.innerHTML += `
          <button onclick="loadStudents(${page - 1})" ${page <= 1 ? "disabled" : ""}>⬅️</button>
          <button onclick="loadStudents(${page + 1})">➡️</button>
        `;
      });
    }

    let currentSeekerPage = 1;

    function loadSeekers(page = 1){
      currentSeekerPage = page;

      fetch(`https://sos-logement.onrender.com/admin/seekers?page=${page}`, {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById("seekers");
        container.innerHTML = "";

        data.forEach(u => {
          container.innerHTML += `
            <div class="card">
              <p>${u.email}</p>
              <button onclick="banUser(${u.id})">Ban</button>
              <button class="delete" onclick="deleteUser(${u.id})">Delete</button>
              <button onclick="sendSingleMail('${u.email}')">📧 Send</button>
            </div>
          `;
        });

        container.innerHTML += `
          <button onclick="loadSeekers(${page - 1})" ${page <= 1 ? "disabled" : ""}>⬅️</button>
          <button onclick="loadSeekers(${page + 1})">➡️</button>
        `;
      });
    }


    function searchUsers() {


      const query = document.getElementById("searchInput").value;


      if (query.length === 0) {
        document.getElementById("searchResults").innerHTML = "";
        return;
      }

      fetch(`https://sos-logement.onrender.com/admin/search?q=${query}`, {
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(data => {

        console.log(data);


        const container = document.getElementById("searchResults");
        container.innerHTML = "";

        data.forEach(u => {
          container.innerHTML += `
            <div class="card">
              <p><b>${u.name}</b> - ${u.email}</p>
              <p>Role: ${u.role}</p>
              <p>Status: ${u.banned ? "🚫 Banned" : "✅ Active"}</p>

              ${!u.banned 
                ? `<button onclick="banUser(${u.id})">Ban</button>` 
                : `<button onclick="unbanUser(${u.id})">Unban</button>`
              }

              <button class="delete" onclick="deleteUser(${u.id})">Delete</button>
              <button onclick="sendSingleMail('${u.email}')">📧 Send</button>
            </div>
          `;
        });

      });
    }

    

      let chart;

      function loadChart(data){

        const ctx = document.getElementById("statsChart");

        if(chart){
          chart.destroy(); // 👈 مهم جدا
        }

        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: ["Users", "Owners", "Students", "Seekers"],
            datasets: [{
              label: "Statistiques",
              data: [
                data.totalUsers,
                data.owners,
                data.students,
                data.seekers
              ]
            }]
          }
        });

      }
    
      function sendSingleMail(email){

        const message = prompt("Écrire le message pour " + email);

        if(!message) return;

        fetch("https://sos-logement.onrender.com/admin/send-one-mail",{
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
          },
          body: JSON.stringify({
            email: email,
            message: message
          })
        });

        alert("Email envoyé à " + email);
      }


    function deleteImage(id){
      if(!confirm("Delete this image?")) return;

      fetch(`https://sos-logement.onrender.com/admin/images/${id}`,{
        method:"DELETE",
        headers:{
          "Authorization":"Bearer "+token
        }
      })
      .then(()=> {
        alert("Image deleted ✅");
        loadApprovedProperties();
      });
    }  


    function loadStats(){

      fetch("https://sos-logement.onrender.com/admin/stats",{
      headers:{ "Authorization": "Bearer " + token }
      })

      .then(res=>res.json())

      .then(data=>{

      document.getElementById("stats").innerHTML = `
      <p>Total utilisateurs: ${data.totalUsers}</p>
      <p>Propriétaires: ${data.owners}</p>
      <p>Étudiants: ${data.students}</p>
      <p>Chercheurs: ${data.seekers}</p>
      <p>Visiteurs: ${data.visitors}</p>
      <p>Utilisateurs bannis: ${data.bannedUsers}</p>
      <p>Biens en attente: ${data.pendingProperties}</p>
      <p>Biens approuvés: ${data.approvedProperties}</p>
      <p>Total biens: ${data.totalProperties}</p>
      `;

      loadChart(data);

      });

    }


    let currentEditId = null;

      function editProperty(id){
        currentEditId = id;
        document.getElementById("editModal").classList.remove("hidden");
      }

      function closeEdit(){
        document.getElementById("editModal").classList.add("hidden");
      }

      function saveEdit(){
        const price = document.getElementById("editPrice").value;
        const city = document.getElementById("editCity").value;
        const files = document.getElementById("editImages").files;

        // 1️⃣ تعديل البيانات
        fetch(`https://sos-logement.onrender.com/admin/properties/${currentEditId}`,{
          method:"PUT",
          headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
          },
          body: JSON.stringify({ price, city })
        });

        // 2️⃣ تعديل الصور
        if(files.length > 0){
          const formData = new FormData();
          for(let f of files){
            formData.append("media", f);
          }

          fetch(`https://sos-logement.onrender.com/admin/properties/${currentEditId}/images`,{
            method:"POST",
            headers:{
              "Authorization":"Bearer "+token
            },
            body: formData
          });
        }

        alert("Updated ✅");
        closeEdit();
        loadApprovedProperties();
      }


    function hideAllSections() {
      document.querySelectorAll(".section").forEach(sec => {
        sec.classList.add("hidden");
      });
    }

    

    function showSection(sectionId) {
        document.querySelectorAll(".section").forEach(sec => {
            sec.classList.add("hidden");
        });

        document.getElementById(sectionId).classList.remove("hidden");

        // 👇 هنا السحر
        if (sectionId === "ownersSection") {
            loadOwners();
        }
    }

    function showStats(){
      showSection("stats");
      loadStats();
    }

    function showApproved(){
      showSection("approvedSection");
      loadApprovedProperties();
    }

    function showPending(){
      showSection("pendingSection");
      loadProperties();
    }

    function showHidden(){
      showSection("hiddenSection");
      loadHiddenProperties();
    }

    function showOwners(){
      showSection("ownersSection");
      loadOwners();
    }

       function showStudents(){
      showSection("studentsSection");
      loadStudents();
    }

    function showSeekers(){
      showSection("seekersSection");
      loadSeekers();
    }

    function showOwnersFull(){
      showSection("ownersFullSection");
      loadOwnersFull();
    }

    function approvePublicOwner(id){
      fetch(`https://sos-logement.onrender.com/admin/public-owner-approve/${id}`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token }
      })
      .then(res => res.json())
      .then(() => {
        alert("Approved ✅");

         loadOwners();       // تحديث قائمة الطلبات
         showOwnersFull();   // 👈 الانتقال لصفحة الملاك
         
        // 👇 إعادة تحميل حقيقية
        setTimeout(() => {
          loadOwners();
        }, 300);
      })
      .catch(err => console.error(err));
    }

    function deletePublicRequest(id){
      fetch(`https://sos-logement.onrender.com/admin/public-owner-delete/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      }).then(() => loadOwners());
    }

    function showDiaspora(){
      showSection("diasporaSection");
      loadDiasporaMessages();
    }

    </script>

  </body>
</html>
