<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" href="SOS-LOGEMENT-01.png">

    <style> 

      .body{
        background-color: rgb(244, 244, 244);
      }
      .one
      {
        
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

      }

      .one fieldset
      {
        width: 50%;
        background-color: azure;
        border-radius: 12px;
        overflow: hidden;
      }
      .one fieldset p{
        text-align: center;
      }
      .btn{
        width: 100px;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="body">

    <div class="one"> 

      <fieldset>
        <legend>Backend de <b>SOS LOGEMENT</b></legend>
            
          <p>Admin:<b> Mouhamed SECK.</b></p><br> 

          <input id="email" placeholder="Email"><br><br> 

          <input id="password" type="password" placeholder="Mot de passe"><br><br> 

          <button onclick="login()" class="btn">Login</button>


      </fieldset>

    </div> 


    <script>
    function login() {
      fetch("https://sos-logement.onrender.com/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      })
      .then(res => res.json())
      .then(data => {
        localStorage.setItem("token", data.token);
        window.location.href = "admin.html";
      });
    }
    </script>

  </body>
</html>
